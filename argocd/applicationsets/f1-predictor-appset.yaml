apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: f1-predictor
  namespace: argocd
  labels:
    app.kubernetes.io/name: f1-predictor
    category: apps
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "40"
spec:
  project: apps
  source:
    repoURL: https://github.com/brettswift/k8s_nas.git
    targetRevision: live
    path: apps/f1-predictor/overlays/home
  destination:
    server: https://kubernetes.default.svc
    namespace: f1-predictor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: f1-predictor-dev
  namespace: argocd
  labels:
    app.kubernetes.io/name: f1-predictor-dev
    category: apps
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "41"
spec:
  project: apps
  source:
    repoURL: https://github.com/brettswift/k8s_nas.git
    targetRevision: f1-dev
    path: apps/f1-predictor/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: f1-predictor-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
