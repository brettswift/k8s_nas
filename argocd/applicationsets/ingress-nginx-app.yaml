# NGINX Ingress (single-node homelab): hostNetwork on 80/443 must use Recreate so a
# rolling update never tries to start a second controller while ports are still held.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  labels:
    app.kubernetes.io/name: ingress-nginx
    category: infrastructure
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.15.1
    helm:
      releaseName: ingress-nginx
      values: |
        controller:
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
          service:
            type: ClusterIP
          admissionWebhooks:
            enabled: false
          updateStrategy:
            type: Recreate
          replicaCount: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
