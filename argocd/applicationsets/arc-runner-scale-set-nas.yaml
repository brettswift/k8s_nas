# Runner scale set for k8s_nas repo. Workflows must use runs-on: nas-k8s-rollout (runnerScaleSetName).
# Requires secret arc-github-app-credentials in arc-runners (see docs/IMAGE_REFRESH_EVENTS.md).
# Argo CD 2.6+ multi-source: OCI chart + Git values file.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-runner-scale-set-nas
  namespace: argocd
  labels:
    app.kubernetes.io/name: arc-runner-scale-set-nas
    category: infrastructure
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: infrastructure
  sources:
    - repoURL: ghcr.io/actions/actions-runner-controller-charts
      chart: gha-runner-scale-set
      targetRevision: "0.10.1"
      helm:
        releaseName: nas-k8s-rollout
        valueFiles:
          - $values/apps/infrastructure/github-actions-runner/helm/values-scale-set-nas.yaml
    - repoURL: git@github.com:brettswift/k8s_nas.git
      targetRevision: live
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-runners
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
