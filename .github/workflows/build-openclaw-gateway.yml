name: Build openclaw-gateway image (vim + bat + rtk binary)

on:
  push:
    branches: [live]
    paths:
      - "apps/infrastructure/openclaw/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: apps/infrastructure/openclaw
          file: apps/infrastructure/openclaw/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/openclaw-gateway:live
