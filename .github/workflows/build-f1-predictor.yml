name: Build f1-predictor image

on:
  push:
    branches: [live, f1-dev]
    paths:
      - "apps/f1-predictor/Dockerfile"
      - "apps/f1-predictor/requirements.txt"
      - "apps/f1-predictor/src/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: apps/f1-predictor
          file: apps/f1-predictor/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/f1-predictor:${{ github.ref_name == 'live' && 'latest' || 'dev' }}
