name: Build f1-predictor prod image

# Runs when f1 changes on live, EXCEPT overlay-only (avoids loop when workflow pushes manifest)
on:
  push:
    branches: [live]
    paths:
      - "apps/f1-predictor/**"
    paths-ignore:
      - "apps/f1-predictor/overlays/home/kustomization.yaml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set SHA and update manifest
        id: sha
        run: |
          SHA=$(git rev-parse --short ${{ github.sha }})
          echo "short=$SHA" >> $GITHUB_OUTPUT
          sed -i "s/newTag: .*/newTag: $SHA/" apps/f1-predictor/overlays/home/kustomization.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/f1-predictor/overlays/home/kustomization.yaml
          git commit -m "chore(f1): set image tag to $SHA [skip ci]"
          git push

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: apps/f1-predictor
          file: apps/f1-predictor/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/f1-predictor:${{ steps.sha.outputs.short }}
