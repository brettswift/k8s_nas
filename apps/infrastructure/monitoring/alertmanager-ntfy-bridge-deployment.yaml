apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager-ntfy-bridge
  namespace: monitoring
  labels:
    app: alertmanager-ntfy-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager-ntfy-bridge
  template:
    metadata:
      labels:
        app: alertmanager-ntfy-bridge
    spec:
      containers:
      - name: bridge
        image: python:3.12-alpine
        command:
        - python
        - -c
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import urllib.request
          import os

          NTFY_BASE = "https://ntfy.sh"
          TOPIC_CRITICAL = os.environ.get("NTFY_TOPIC_CRITICAL", "k8s-nas-critical")
          TOPIC_WARNING = os.environ.get("NTFY_TOPIC_WARNING", "k8s-nas-warnings")
          TOPIC_DEFAULT = os.environ.get("NTFY_TOPIC_DEFAULT", "k8s-nas-alerts")

          def send_ntfy(topic, title, message, tags=None):
              url = f"{NTFY_BASE}/{topic}"
              data = message.encode("utf-8")
              req = urllib.request.Request(url, data=data, method="POST")
              req.add_header("Title", title[:250])
              req.add_header("Content-Type", "text/plain; charset=utf-8")
              if tags:
                  req.add_header("Tags", tags)
              urllib.request.urlopen(req, timeout=10)

          class Handler(BaseHTTPRequestHandler):
              def do_POST(self):
                  if self.path != "/webhook":
                      self.send_response(404)
                      self.end_headers()
                      return
                  length = int(self.headers.get("Content-Length", 0))
                  body = self.rfile.read(length)
                  try:
                      data = json.loads(body)
                      status = data.get("status", "firing")
                      for alert in data.get("alerts", []):
                          labels = alert.get("labels", {})
                          annotations = alert.get("annotations", {})
                          severity = labels.get("severity", "info")
                          summary = annotations.get("summary", "Alert")
                          desc = annotations.get("description", "")
                          topic = TOPIC_CRITICAL if severity == "critical" else TOPIC_WARNING if severity == "warning" else TOPIC_DEFAULT
                          title = f"[{severity.upper()}] {summary}"
                          msg = desc or summary
                          if status == "resolved":
                              title = f"[RESOLVED] {summary}"
                              send_ntfy(topic, title, msg, "white_check_mark")
                          else:
                              send_ntfy(topic, title, msg, "warning" if severity == "warning" else "rotating_light")
                  except Exception as e:
                      send_ntfy(TOPIC_DEFAULT, "Alertmanager bridge error", str(e), "x")
                  self.send_response(200)
                  self.end_headers()

              def log_message(self, format, *args):
                  pass

          HTTPServer(("", 9099), Handler).serve_forever()
        ports:
        - containerPort: 9099
        env:
        - name: NTFY_TOPIC_CRITICAL
          valueFrom:
            configMapKeyRef:
              name: alertmanager-ntfy-bridge-config
              key: NTFY_TOPIC_CRITICAL
        - name: NTFY_TOPIC_WARNING
          valueFrom:
            configMapKeyRef:
              name: alertmanager-ntfy-bridge-config
              key: NTFY_TOPIC_WARNING
        - name: NTFY_TOPIC_DEFAULT
          valueFrom:
            configMapKeyRef:
              name: alertmanager-ntfy-bridge-config
              key: NTFY_TOPIC_DEFAULT
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "100m"
