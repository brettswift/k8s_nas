apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # Drop noisy system namespaces by default.
          - action: drop
            source_labels: [__meta_kubernetes_namespace]
            regex: kube-system|kube-public|kube-node-lease
          # Allow opt-out via namespace label: logging=disabled
          - action: drop
            source_labels: [__meta_kubernetes_namespace_label_logging]
            regex: disabled
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - action: replace
            source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - action: replace
            source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - action: replace
            source_labels: [__meta_kubernetes_node_name]
            target_label: node
          - action: replace
            source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - action: replace
            source_labels: [__meta_kubernetes_pod_container_name, __meta_kubernetes_pod_name, __meta_kubernetes_namespace]
            regex: (.+);(.+);(.+)
            replacement: /var/log/containers/*$2_$3_$1-*.log
            target_label: __path__
        pipeline_stages:
          - docker: {}
