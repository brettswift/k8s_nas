# Script for grafana-ntfy-proxy: receives Grafana webhook JSON, forwards clean title+message to ntfy.sh
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-ntfy-proxy-script
  namespace: monitoring
data:
  relay.py: |
    #!/usr/bin/env python3
    """Receive Grafana webhook JSON; POST clean title + message to ntfy.sh."""
    import json
    import os
    import urllib.request
    import urllib.error
    from http.server import HTTPServer, BaseHTTPRequestHandler

    NTFY_TOPIC = os.environ.get("NTFY_TOPIC", "bswift_homelab")
    NTFY_URL = f"https://ntfy.sh/{NTFY_TOPIC}"
    PORT = int(os.environ.get("PORT", "8080"))

    class Handler(BaseHTTPRequestHandler):
        def do_POST(self):
            try:
                length = int(self.headers.get("Content-Length", 0))
                body = self.rfile.read(length).decode("utf-8", errors="replace")
                data = json.loads(body) if body else {}
            except (json.JSONDecodeError, ValueError) as e:
                self.send_response(400)
                self.end_headers()
                self.wfile.write(f"Bad request: {e}".encode())
                return

            # Grafana payload: title/message may be at top level; or use groupLabels.alertname + commonAnnotations.summary
            title = (
                data.get("title")
                or (data.get("groupLabels") or {}).get("alertname")
                or "Grafana Alert"
            )
            message = (
                data.get("message")
                or (data.get("commonAnnotations") or {}).get("summary")
                or "No description"
            )
            status = data.get("status", "firing")
            if status == "resolved":
                title = f"[Resolved] {title}"
            # ntfy: Title header = notification title; body = notification body (plain text)
            body_plain = message if message else title

            req = urllib.request.Request(
                NTFY_URL,
                data=body_plain.encode("utf-8"),
                method="POST",
                headers={
                    "Title": title[:200],
                    "Content-Type": "text/plain; charset=utf-8",
                },
            )
            try:
                with urllib.request.urlopen(req, timeout=10) as r:
                    pass
            except urllib.error.HTTPError as e:
                self.send_response(502)
                self.end_headers()
                self.wfile.write(f"ntfy error: {e.code}".encode())
                return
            except Exception as e:
                self.send_response(502)
                self.end_headers()
                self.wfile.write(str(e).encode())
                return

            self.send_response(200)
            self.send_header("Content-Type", "text/plain")
            self.end_headers()
            self.wfile.write(b"OK")

        def log_message(self, format, *args):
            pass

    HTTPServer(("", PORT), Handler).serve_forever()
