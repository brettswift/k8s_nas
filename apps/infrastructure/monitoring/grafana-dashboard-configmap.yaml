  landing-cluster-overview.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "gnetId": null,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": "-- Grafana --",
          "gridPos": {
            "h": 4,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "content": "## Cluster Overview\\n\\nThis is a high-level landing page (no graphs).\\n\\n- **Cluster CPU (cores)**: average CPU core-equivalents used across the cluster for the selected time range. Example: **0.26 cores** means the workload used ~26% of one CPU core on average (not 0.26%).\\n- **Cluster CPU (% of cores)**: the same number expressed as a percentage of total cluster CPU cores.\\n- **Cluster Error Log %**: percentage of log lines matching common error patterns over the last 5 minutes.\\n- **Top CPU (relative)**: top 5 CPU consumers, normalized so the top consumer is always **100%**.",
            "mode": "markdown"
          },
          "title": "Overview",
          "type": "text"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": null
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 2,
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "unit": "cores"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 6,
            "w": 8,
            "x": 0,
            "y": 4
          },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value"
          },
          "targets": [
            {
              "expr": "avg_over_time(sum(rate(container_cpu_usage_seconds_total{container!=\"POD\",container!=\"\"}[$__rate_interval]))[$__range:$__interval])",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Cluster CPU (avg over selected time range, cores)",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": null
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 2,
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 50
                  },
                  {
                    "color": "red",
                    "value": 80
                  }
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 6,
            "w": 8,
            "x": 8,
            "y": 4
          },
          "id": 5,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value"
          },
          "targets": [
            {
              "expr": "100 * (avg_over_time(sum(rate(container_cpu_usage_seconds_total{container!=\"POD\",container!=\"\"}[$__rate_interval]))[$__range:$__interval]) / sum(machine_cpu_cores))",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Cluster CPU (avg over selected time range, % of cores)",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": null
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 2,
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 5
                  }
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 6,
            "w": 8,
            "x": 16,
            "y": 4
          },
          "id": 3,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value"
          },
          "targets": [
            {
              "expr": "100 * (sum(rate({job=\"loki.source.kubernetes.pods\"} |~ \"(?i)(error|exception|fatal|panic|failed|failure)\" [5m])) / sum(rate({job=\"loki.source.kubernetes.pods\"} [5m])))",
              "refId": "A"
            }
          ],
          "title": "Cluster Error Log % (last 5m)",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": null
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "max": 100,
              "min": 0,
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 10
          },
          "id": 4,
          "options": {
            "displayMode": "gradient",
            "minVizHeight": 10,
            "minVizWidth": 0,
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showUnfilled": true,
            "valueMode": "color"
          },
          "targets": [
            {
              "expr": "100 * (topk(5, avg_over_time(sum(rate(container_cpu_usage_seconds_total{container!=\"POD\",container!=\"\"}[$__rate_interval])) by (namespace, pod)[$__range:$__interval])) / max(topk(5, avg_over_time(sum(rate(container_cpu_usage_seconds_total{container!=\"POD\",container!=\"\"}[$__rate_interval])) by (namespace, pod)[$__range:$__interval]))))",
              "instant": true,
              "legendFormat": "{{namespace}}/{{pod}}",
              "refId": "A"
            }
          ],
          "title": "Top 5 CPU Consumers (relative to top, avg over selected time range)",
          "type": "bargauge"
        }
      ],
      "schemaVersion": 27,
      "style": "dark",
      "tags": [
        "landing",
        "overview"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-5m",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Landing - Cluster Overview",
      "uid": "landing-cluster-overview",
      "version": 1
    }
