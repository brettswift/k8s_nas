  landing-cluster-overview.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "gnetId": null,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": "-- Grafana --",
          "gridPos": {
            "h": 3,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "description": "High-level landing page.\n\nHover panel titles (or use panel menu) for more details:\n- Cluster CPU % is averaged over the selected time range and measured vs total host CPU cores (machine_cpu_cores).\n- Top 5 bars are each pod’s average CPU usage over the selected time range as % of total cores (not normalized).\n- Error Log % is the percentage of logs matching common error patterns over the last 5 minutes.",
          "options": {
            "content": "**Cluster overview** — CPU % over range · Error log % (last 5m) · Top 5 CPU consumers (% of cores)",
            "mode": "markdown"
          },
          "title": "Overview",
          "type": "text"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": null
          },
          "description": "Average CPU usage over the selected time range, expressed as % of total host CPU cores (sum(machine_cpu_cores)).",
          "fieldConfig": {
            "defaults": {
              "decimals": 2,
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 50
                  },
                  {
                    "color": "red",
                    "value": 80
                  }
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 6,
            "w": 12,
            "x": 0,
            "y": 3
          },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value"
          },
          "targets": [
            {
              "expr": "100 * (avg_over_time(sum(rate(container_cpu_usage_seconds_total{container!=\"POD\",container!=\"\"}[$__rate_interval]))[$__range:$__interval]) / scalar(sum(machine_cpu_cores)))",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Cluster CPU (avg over selected time range, % of cores)",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": null
          },
          "description": "Percentage of log lines matching common error patterns over the last 5 minutes (cluster-wide).",
          "fieldConfig": {
            "defaults": {
              "decimals": 2,
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 5
                  }
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 6,
            "w": 12,
            "x": 12,
            "y": 3
          },
          "id": 3,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value"
          },
          "targets": [
            {
              "expr": "100 * (sum(rate({job=\"loki.source.kubernetes.pods\"} |~ \"(?i)(error|exception|fatal|panic|failed|failure)\" [5m])) / sum(rate({job=\"loki.source.kubernetes.pods\"} [5m])))",
              "refId": "A"
            }
          ],
          "title": "Cluster Error Log % (last 5m)",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": null
          },
          "description": "Top 5 CPU consumers over the selected time range, expressed as % of total host CPU cores. 100% means using all cluster CPU capacity.",
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "max": 100,
              "min": 0,
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 9
          },
          "id": 4,
          "options": {
            "displayMode": "gradient",
            "minVizHeight": 10,
            "minVizWidth": 0,
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showUnfilled": true,
            "valueMode": "color"
          },
          "targets": [
            {
              "expr": "100 * (topk(5, label_replace(avg_over_time(sum(rate(container_cpu_usage_seconds_total{container!=\"POD\",container!=\"\"}[$__rate_interval])) by (namespace, pod)[$__range:$__interval]), \"app\", \"$1\", \"pod\", \"^([^-]+).*\")) / scalar(sum(machine_cpu_cores)))",
              "instant": true,
              "legendFormat": "{{app}}",
              "refId": "A"
            }
          ],
          "title": "Top 5 CPU Consumers (avg over selected time range, % of cores)",
          "type": "bargauge"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": null
          },
          "description": "Top 5 log producers over the selected time range, normalized to show the top producer at 100%. Each bar represents that service's log volume relative to the top producer.",
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "max": 100,
              "min": 0,
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 19
          },
          "id": 5,
          "options": {
            "displayMode": "gradient",
            "minVizHeight": 10,
            "minVizWidth": 0,
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showUnfilled": true,
            "valueMode": "color"
          },
          "targets": [
            {
              "expr": "topk(5, sum(count_over_time({job=\"loki.source.kubernetes.pods\",app!=\"\"} [$__range])) by (namespace, app))",
              "instant": true,
              "legendFormat": "{{namespace}}/{{app}}",
              "refId": "A"
            }
          ],
          "transformations": [
            {
              "id": "groupBy",
              "options": {
                "fields": {
                  "Value": {
                    "aggregations": ["max"],
                    "operation": "aggregate"
                  },
                  "namespace": {
                    "aggregations": [],
                    "operation": "groupby"
                  },
                  "app": {
                    "aggregations": [],
                    "operation": "groupby"
                  }
                }
              }
            },
            {
              "id": "calculateField",
              "options": {
                "alias": "Percent",
                "binary": {
                  "left": "Value",
                  "operator": "/",
                  "reducer": "max"
                },
                "mode": "binary",
                "reduce": {
                  "include": [
                    "Value"
                  ],
                  "reducer": "max"
                },
                "replaceFields": false,
                "resultName": "Percent"
              }
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Value": true
                },
                "indexByName": {},
                "renameByName": {
                  "Percent": "Percent",
                  "namespace": "namespace",
                  "app": "app"
                }
              }
            }
          ],
          "title": "Top 5 Log Producers (normalized, top = 100%)",
          "type": "bargauge"
        }
      ],
      "schemaVersion": 27,
      "style": "dark",
      "tags": [
        "landing",
        "overview"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-5m",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Landing - Cluster Overview",
      "uid": "landing-cluster-overview",
      "version": 1
    }
