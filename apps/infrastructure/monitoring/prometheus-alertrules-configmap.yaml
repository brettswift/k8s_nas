apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alertrules
  namespace: monitoring
data:
  alerts.yml: |
    groups:
      - name: pod_health
        interval: 30s
        rules:
          - alert: PodCrashLoopBackOff
            expr: kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"} == 1
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.pod }} in {{ $labels.namespace }} is crash looping"
              description: "Container {{ $labels.container }} in CrashLoopBackOff. Check: kubectl logs -n {{ $labels.namespace }} {{ $labels.pod }} -c {{ $labels.container }} --previous"

          - alert: PodHighRestarts
            expr: increase(kube_pod_container_status_restarts_total{namespace=~"media|homepage|qbittorrent"}[1h]) >= 5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} ({{ $labels.container }}) has high restart count"
              description: "{{ $value }} restarts in the last hour in {{ $labels.namespace }}"

      - name: critical_services
        interval: 30s
        rules:
          - alert: JellyfinDown
            expr: kube_deployment_status_replicas_ready{deployment="jellyfin", namespace="media"} == 0
            for: 3m
            labels:
              severity: critical
            annotations:
              summary: "Jellyfin is down"
              description: "No Jellyfin replicas ready in media namespace"

          - alert: HomepageDown
            expr: kube_deployment_status_replicas_ready{deployment="homepage", namespace="homepage"} == 0
            for: 3m
            labels:
              severity: critical
            annotations:
              summary: "Homepage is down"
              description: "No homepage replicas ready"

          - alert: SABnzbdDown
            expr: kube_deployment_status_replicas_ready{deployment="sabnzbd", namespace="media"} == 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "SABnzbd is down"
              description: "No SABnzbd replicas ready in media namespace"
