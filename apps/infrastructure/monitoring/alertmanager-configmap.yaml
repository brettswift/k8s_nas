apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      smtp_smarthost: 'localhost:587'
      smtp_from: 'alertmanager@brettswift.com'
    
    route:
      receiver: 'default'
      group_by: ['alertname', 'severity']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      routes:
      - match:
          severity: critical
        receiver: 'ntfy-critical'
        repeat_interval: 1h
        continue: true
      - match:
          severity: warning
        receiver: 'ntfy-warnings'
        repeat_interval: 2h
        continue: true
      - match:
          severity: info
        receiver: 'ntfy-info'
        repeat_interval: 4h
        continue: true
    
    receivers:
    - name: 'default'
      webhook_configs:
      - url: 'http://alertmanager-ntfy-bridge.monitoring.svc.cluster.local:5000/webhook/default'
        send_resolved: true
    
    - name: 'ntfy-critical'
      webhook_configs:
      - url: 'http://alertmanager-ntfy-bridge.monitoring.svc.cluster.local:5000/webhook/critical'
        send_resolved: true
    
    - name: 'ntfy-warnings'
      webhook_configs:
      - url: 'http://alertmanager-ntfy-bridge.monitoring.svc.cluster.local:5000/webhook/warnings'
        send_resolved: true
    
    - name: 'ntfy-info'
      webhook_configs:
      - url: 'http://alertmanager-ntfy-bridge.monitoring.svc.cluster.local:5000/webhook/info'
        send_resolved: true
