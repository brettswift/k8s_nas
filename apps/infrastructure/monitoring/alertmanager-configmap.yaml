apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: ntfy-default
      group_by: [alertname, namespace]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - match:
            severity: critical
          receiver: ntfy-critical
          repeat_interval: 1h
        - match:
            severity: warning
          receiver: ntfy-warnings
          repeat_interval: 2h

    receivers:
      - name: ntfy-default
        webhook_configs:
          - url: http://alertmanager-ntfy-bridge.monitoring.svc.cluster.local:9099/webhook
            send_resolved: true
      - name: ntfy-critical
        webhook_configs:
          - url: http://alertmanager-ntfy-bridge.monitoring.svc.cluster.local:9099/webhook
            send_resolved: true
      - name: ntfy-warnings
        webhook_configs:
          - url: http://alertmanager-ntfy-bridge.monitoring.svc.cluster.local:9099/webhook
            send_resolved: true
