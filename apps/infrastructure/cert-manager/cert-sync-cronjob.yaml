apiVersion: batch/v1
kind: CronJob
metadata:
  name: sync-cert-secret
  namespace: argocd
spec:
  schedule: "*/15 * * * *"  # Every 15 minutes (sufficient for cert renewals)
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: cert-sync-sa
          restartPolicy: OnFailure
          containers:
          - name: sync-secret
            image: bitnami/kubectl:latest
            command:
            - /bin/bash
            - -c
            - |
              set -e
              SOURCE_NS="kube-system"
              for SECRET_NAME in home-brettswift-com-tls brettswift-com-tls; do
                TARGET_NS=$(kubectl get ingress -A -o jsonpath='{range .items[*]}{.metadata.namespace}{"\t"}{.spec.tls[0].secretName}{"\n"}{end}' 2>/dev/null | grep "$SECRET_NAME" | cut -f1 | sort -u || true)
                [ -z "$TARGET_NS" ] && continue
                echo "Syncing $SECRET_NAME to: $TARGET_NS"
                for ns in $TARGET_NS; do
                  [ "$ns" = "$SOURCE_NS" ] && continue
                  kubectl get secret "$SECRET_NAME" -n "$SOURCE_NS" -o yaml 2>/dev/null | \
                    sed "s/namespace: $SOURCE_NS/namespace: $ns/" | \
                    sed '/^  uid:/d' | sed '/^  resourceVersion:/d' | sed '/^  selfLink:/d' | \
                    kubectl apply -f -
                done
              done
              echo "✅ Sync complete"
