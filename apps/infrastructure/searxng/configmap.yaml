apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-settings
  namespace: openclaw
data:
  settings.yml: |
    use_default_settings: false

    general:
      instance_name: "Brett's SearXNG"
      privacypolicy_url: false
      donation_url: false
      contact_url: false
      enable_stats: false
      max_results: 20

    search:
      formats:
        - html
        - json

    server:
      secret_key: "UP7ucIULLX8uoKsQnJIk9UK21A10gZ2pydbntsy6aFc"
      bind_address: "0.0.0.0"
      port: 8080
      limiter: false
      public_instance: false

    outgoing:
      request_timeout: 10.0
