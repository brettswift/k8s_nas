apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: searxng-config
  namespace: openclaw
  labels:
    app: searxng
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 64Mi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: searxng-data
  namespace: openclaw
  labels:
    app: searxng
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 256Mi
