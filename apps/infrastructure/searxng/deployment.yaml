apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: openclaw
  labels:
    app: searxng
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      initContainers:
        - name: init
          image: docker.io/searxng/searxng:latest
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              cp /etc/searxng-defaults/settings.yml /etc/searxng/settings.yml
              chown -R 999:999 /etc/searxng /var/cache/searxng
              chmod -R u+rwX,g+rX,o-rwx /etc/searxng /var/cache/searxng
          volumeMounts:
            - name: config-defaults
              mountPath: /etc/searxng-defaults
            - name: config
              mountPath: /etc/searxng
            - name: data
              mountPath: /var/cache/searxng
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
      containers:
        - name: searxng
          image: docker.io/searxng/searxng:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SEARXNG_BASE_URL
              value: "https://search.home.brettswift.com/"
            - name: SEARXNG_SECRET
              value: "UP7ucIULLX8uoKsQnJIk9UK21A10gZ2pydbntsy6aFc"
            - name: SEARXNG_JSON
              value: "1"
            - name: SEARXNG_FORMAT
              value: "json"
            - name: SEARXNG_PORT
              value: "8080"
          volumeMounts:
            - name: config
              mountPath: /etc/searxng
            - name: data
              mountPath: /var/cache/searxng
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
      volumes:
        - name: config-defaults
          configMap:
            name: searxng-settings
        - name: config
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: searxng-data