apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: openclaw
  labels:
    app: searxng
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      initContainers:
        - name: permissions
          image: busybox:1.36
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          command:
            - sh
            - -c
            - |
              chown -R 999:999 /etc/searxng /var/cache/searxng
              chmod -R u+rwX,g+rX,o-rwx /etc/searxng /var/cache/searxng
          volumeMounts:
            - name: config
              mountPath: /etc/searxng
            - name: data
              mountPath: /var/cache/searxng
      containers:
        - name: searxng
          image: docker.io/searxng/searxng:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SEARXNG_BASE_URL
              value: "https://search.home.brettswift.com/"
            - name: SEARXNG_SECRET
              value: "UP7ucIULLX8uoKsQnJIk9UK21A10gZ2pydbntsy6aFc"
            - name: SEARXNG_JSON
              value: "1"
            - name: SEARXNG_FORMATS
              value: "html json"
            - name: USE_DEFAULT_SETTINGS
              value: "false"
          volumeMounts:
            - name: config
              mountPath: /etc/searxng
              readOnly: true
            - name: data
              mountPath: /var/cache/searxng
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
      volumes:
        - name: config
          configMap:
            name: searxng-settings
        - name: data
          persistentVolumeClaim:
            claimName: searxng-data
