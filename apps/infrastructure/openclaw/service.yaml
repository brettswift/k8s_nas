apiVersion: v1
kind: Service
metadata:
  name: openclaw-gateway
  namespace: openclaw
  labels:
    app: openclaw-gateway
spec:
  selector:
    app: openclaw-gateway
  ports:
    - name: http
      port: 80
      targetPort: 18789
    - name: bridge
      port: 18790
      targetPort: 18790
  type: ClusterIP
