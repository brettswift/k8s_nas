resources:
  - namespace.yaml
  - pvc.yaml
  - configmap-golden.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  # NetworkPolicy disabled: intended to block pod-to-pod but breaks egress (DNS/internet)
  # on this cluster's CNI. See networkpolicy.yaml for the policy; re-enable when CNI
  # supports it or after testing with explicit ports/CIDRs.
  # - networkpolicy.yaml

configMapGenerator:
  - name: openclaw-rtk-plugin
    options:
      disableNameSuffixHash: true
    files:
      - index.ts=rtk-plugin/index.ts
      - openclaw.plugin.json=rtk-plugin/openclaw.plugin.json
