# Dedicated ServiceAccount for OpenClaw gateway pods (kubectl + API clients).
# - ClusterRole view: read-only list/get/watch cluster-wide.
# - RoleBinding to admin: full control within the listed namespaces only.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-gateway
  namespace: openclaw
  labels:
    app: openclaw-gateway
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openclaw-gateway-cluster-view
  labels:
    app: openclaw-gateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: openclaw-gateway
    namespace: openclaw
---
# Namespace-scoped admin (built-in ClusterRole "admin" via RoleBinding).
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openclaw-gateway-namespace-admin
  namespace: homepage
  labels:
    app: openclaw-gateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
  - kind: ServiceAccount
    name: openclaw-gateway
    namespace: openclaw
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openclaw-gateway-namespace-admin
  namespace: media
  labels:
    app: openclaw-gateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
  - kind: ServiceAccount
    name: openclaw-gateway
    namespace: openclaw
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openclaw-gateway-namespace-admin
  namespace: qbittorrent
  labels:
    app: openclaw-gateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
  - kind: ServiceAccount
    name: openclaw-gateway
    namespace: openclaw
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openclaw-gateway-namespace-admin
  namespace: f1-predictor
  labels:
    app: openclaw-gateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
  - kind: ServiceAccount
    name: openclaw-gateway
    namespace: openclaw
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openclaw-gateway-namespace-admin
  namespace: f1-predictor-dev
  labels:
    app: openclaw-gateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
  - kind: ServiceAccount
    name: openclaw-gateway
    namespace: openclaw
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openclaw-gateway-namespace-admin
  namespace: maritime-vacation-site
  labels:
    app: openclaw-gateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
