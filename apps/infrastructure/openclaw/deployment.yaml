apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-gateway
  namespace: openclaw
  labels:
    app: openclaw-gateway
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw-gateway
  template:
    metadata:
      labels:
        app: openclaw-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: seed-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /data/.openclaw
              if [ ! -f /data/.openclaw/openclaw.json ] && [ ! -f /data/openclaw.json ]; then
                echo '{"gateway":{"controlUi":{"allowedOrigins":["https://home.brettswift.com","https://openclaw.home.brettswift.com"]}}}' > /data/.openclaw/openclaw.json
              fi
          volumeMounts:
            - name: data
              mountPath: /data
        - name: strip-rtk-artifacts
          image: ghcr.io/brettswift/openclaw-gateway:live
          imagePullPolicy: Always
          command:
            - python3
            - -c
            - |
              import json
              import os
              import shutil

              path = "/data/.openclaw/openclaw.json"
              if os.path.isfile(path):
                  with open(path, encoding="utf-8") as f:
                      data = json.load(f)
                  plugins = data.get("plugins")
                  if isinstance(plugins, dict):
                      entries = plugins.get("entries")
                      if isinstance(entries, dict) and "rtk-rewrite" in entries:
                          del entries["rtk-rewrite"]
                  with open(path, "w", encoding="utf-8") as f:
                      json.dump(data, f, indent=2)
                      f.write("\n")
              ext = "/data/.openclaw/extensions/rtk-rewrite"
              if os.path.isdir(ext):
                  shutil.rmtree(ext)
          volumeMounts:
            - name: data
              mountPath: /data
        - name: ensure-workspace-perms
          image: busybox:1.36
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          command:
            - sh
            - -c
            - |
              set -e
              # One-time migration: move old layout (openclaw.json at PVC root) into .openclaw/
              if [ -f /data/openclaw.json ] && [ ! -f /data/.openclaw/openclaw.json ]; then
                mkdir -p /data/.openclaw
                for x in openclaw.json openclaw.json.bak workspace .env; do
                  [ -e /data/"$x" ] && mv /data/"$x" /data/.openclaw/
                done
              fi
              # If previous run crashed (sentinel still exists), restore from backup
              if [ -f /data/.gateway-starting ]; then
                if [ -f /data/.openclaw/openclaw.json.bak ]; then
                  cp /data/.openclaw/openclaw.json /data/.openclaw/openclaw.json.bad.$(date +%s) 2>/dev/null || true
                  cp /data/.openclaw/openclaw.json.bak /data/.openclaw/openclaw.json
                elif [ -f /golden/openclaw.json ]; then
                  cp /data/.openclaw/openclaw.json /data/.openclaw/openclaw.json.bad.$(date +%s) 2>/dev/null || true
                  cp /golden/openclaw.json /data/.openclaw/openclaw.json
                fi
              fi
              chown -R 1000:1000 /data
              chmod -R u+rwX,g+rX,o-rwx /data
              mkdir -p /data/.openclaw/workspace
              chown 1000:1000 /data/.openclaw/workspace
              chmod 755 /data/.openclaw/workspace
              touch /data/.gateway-starting
              chown 1000:1000 /data/.gateway-starting
          volumeMounts:
            - name: data
              mountPath: /data
            - name: golden-config
              mountPath: /golden
              readOnly: true
      containers:
        - name: gateway
          image: ghcr.io/brettswift/openclaw-gateway:live
          imagePullPolicy: Always
          workingDir: /home/node/.openclaw/workspace
          args:
            - node
            - /app/dist/index.js
            - gateway
            - --allow-unconfigured
            - --bind
            - "lan"
            - --port
            - "18789"
          ports:
            - containerPort: 18789
              name: http
            - containerPort: 18790
              name: bridge
          env:
            - name: HOME
              value: /home/node
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1536"
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-gateway-token
                  key: token
                  optional: true
            - name: OPENCLAW_GATEWAY_SCOPES
              value: "operator.read,operator.write,cron.manage"
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram-bot-token
                  key: token
                  optional: true
            - name: HA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-home-assistant-token
                  key: token
                  optional: true
            # API keys: not injected here so OpenClaw reads them from ~/.openclaw/.env on the PVC.
          volumeMounts:
            # Whole home on PVC so ~/.ssh, ~/.bashrc, etc. persist
            - name: data
              mountPath: /home/node
          resources:
            requests:
              cpu: 150m
              memory: 512Mi
            limits:
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /
              port: 18789
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 18789
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
        - name: config-sentinel
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              while ! wget -q -O /dev/null http://127.0.0.1:18789/healthz 2>/dev/null; do sleep 5; done
              rm -f /data/.gateway-starting
              exec sleep infinity
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: golden-config
          configMap:
            name: openclaw-golden-config
