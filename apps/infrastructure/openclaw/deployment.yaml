apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-gateway
  namespace: openclaw
  labels:
    app: openclaw-gateway
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw-gateway
  template:
    metadata:
      labels:
        app: openclaw-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: seed-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /data/.openclaw
              if [ ! -f /data/.openclaw/openclaw.json ] && [ ! -f /data/openclaw.json ]; then
                echo '{"gateway":{"controlUi":{"allowedOrigins":["https://home.brettswift.com","https://openclaw.home.brettswift.com"]}}}' > /data/.openclaw/openclaw.json
              fi
          volumeMounts:
            - name: data
              mountPath: /data
        - name: merge-openclaw-rtk-config
          image: ghcr.io/brettswift/openclaw-gateway:live
          imagePullPolicy: Always
          command:
            - python3
            - -c
            - |
              import json
              import os

              path = "/data/.openclaw/openclaw.json"
              os.makedirs(os.path.dirname(path), exist_ok=True)
              data = {}
              if os.path.isfile(path):
                  with open(path, encoding="utf-8") as f:
                      data = json.load(f)

              plugins = data.setdefault("plugins", {})

              # Clean up stale searxng plugin entries (plugin not installed)
              if "searxng" in plugins.get("allow", []):
                  plugins["allow"] = [p for p in plugins["allow"] if p != "searxng"]
              entries = plugins.setdefault("entries", {})
              if "searxng" in entries:
                  del entries["searxng"]

              # Ensure rtk-rewrite is properly configured
              rtk = entries.get("rtk-rewrite", {})
              rtk["enabled"] = True
              cfg = rtk.setdefault("config", {})
              cfg.setdefault("enabled", True)
              cfg.setdefault("verbose", False)
              entries["rtk-rewrite"] = rtk

              with open(path, "w", encoding="utf-8") as f:
                  json.dump(data, f, indent=2)
                  f.write("\n")
          volumeMounts:
            - name: data
              mountPath: /data
        - name: seed-rtk-plugin
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /data/.openclaw/extensions/rtk-rewrite
              cp /rtk/index.ts /rtk/openclaw.plugin.json /data/.openclaw/extensions/rtk-rewrite/
          volumeMounts:
            - name: data
              mountPath: /data
            - name: rtk-plugin-files
              mountPath: /rtk
              readOnly: true
        - name: ensure-workspace-perms
          image: busybox:1.36
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          command:
            - sh
            - -c
            - |
              set -e
              # One-time migration: move old layout (openclaw.json at PVC root) into .openclaw/
              if [ -f /data/openclaw.json ] && [ ! -f /data/.openclaw/openclaw.json ]; then
                mkdir -p /data/.openclaw
                for x in openclaw.json openclaw.json.bak workspace .env; do
                  [ -e /data/"$x" ] && mv /data/"$x" /data/.openclaw/
                done
              fi
              # If previous run crashed (sentinel still exists), restore from backup
              if [ -f /data/.gateway-starting ]; then
                if [ -f /data/.openclaw/openclaw.json.bak ]; then
                  cp /data/.openclaw/openclaw.json /data/.openclaw/openclaw.json.bad.$(date +%s) 2>/dev/null || true
                  cp /data/.openclaw/openclaw.json.bak /data/.openclaw/openclaw.json
                elif [ -f /golden/openclaw.json ]; then
                  cp /data/.openclaw/openclaw.json /data/.openclaw/openclaw.json.bad.$(date +%s) 2>/dev/null || true
                  cp /golden/openclaw.json /data/.openclaw/openclaw.json
                fi
              fi
              chown -R 1000:1000 /data
              chmod -R u+rwX,g+rX,o-rwx /data
              mkdir -p /data/.openclaw/workspace
              chown 1000:1000 /data/.openclaw/workspace
              chmod 755 /data/.openclaw/workspace
              # After recursive chmod, OpenSSH private keys must be 0600 (no group read).
              # Detect PEM/private-key headers so any key filename works (id_ed25519, deploy keys, etc.).
              ssh_d="/data/.ssh"
              if [ -d "$ssh_d" ]; then
                chmod 700 "$ssh_d" 2>/dev/null || true
                find "$ssh_d" -type f 2>/dev/null | while IFS= read -r keyf; do
                  case "$keyf" in
                    *.pub) continue ;;
                  esac
                  case "$keyf" in
                    */known_hosts|*/known_hosts.old|*/authorized_keys|*/config|*/authorized_keys2)
                      continue ;;
                  esac
                  [ -r "$keyf" ] && [ -s "$keyf" ] || continue
                  first=$(head -n 1 "$keyf" 2>/dev/null) || continue
                  case "$first" in
                    -----BEGIN*PRIVATE*KEY-----*) chmod 600 "$keyf" || true ;;
                  esac
                done
              fi
              # Config and credentials: no group/other read (same PVC chmod as SSH keys).
              [ -f /data/.openclaw/openclaw.json ] && chmod 600 /data/.openclaw/openclaw.json || true
              [ -d /data/.openclaw/credentials ] && chmod 700 /data/.openclaw/credentials || true
              touch /data/.gateway-starting
              chown 1000:1000 /data/.gateway-starting
          volumeMounts:
            - name: data
              mountPath: /data
            - name: golden-config
              mountPath: /golden
              readOnly: true
      containers:
        - name: gateway
          image: ghcr.io/brettswift/openclaw-gateway:live
          imagePullPolicy: Always
          workingDir: /home/node/.openclaw/workspace
          args:
            - node
            - /app/dist/index.js
            - gateway
            - --allow-unconfigured
            - --bind
            - "lan"
            - --port
            - "18789"
          ports:
            - containerPort: 18789
              name: http
            - containerPort: 18790
              name: bridge
          env:
            - name: HOME
              value: /home/node
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1536"
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-gateway-token
                  key: token
                  optional: true
            - name: OPENCLAW_GATEWAY_SCOPES
              value: "operator.read,operator.write,cron.manage"
            - name: HA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-home-assistant-token
                  key: token
                  optional: true
            - name: RTK_TELEMETRY_DISABLED
              value: "1"
            - name: SEARXNG_BASE_URL
              value: "http://searxng.openclaw.svc"
            # Telegram + other API keys: set in ~/.openclaw/.env on the PVC (avoid
            # duplicating TELEGRAM_BOT_TOKEN as a K8s env secret — it overrides .env).
          volumeMounts:
            # Whole home on PVC so ~/.ssh, ~/.bashrc, etc. persist
            - name: data
              mountPath: /home/node
          resources:
            requests:
              cpu: 25m
              memory: 512Mi
            limits:
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /
              port: 18789
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 18789
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
        - name: config-sentinel
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              while ! wget -q -O /dev/null http://127.0.0.1:18789/healthz 2>/dev/null; do sleep 5; done
              rm -f /data/.gateway-starting
              exec sleep infinity
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: golden-config
          configMap:
            name: openclaw-golden-config
        - name: rtk-plugin-files
          configMap:
            name: openclaw-rtk-plugin
