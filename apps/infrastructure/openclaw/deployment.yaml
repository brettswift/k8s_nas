apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-gateway
  namespace: openclaw
  labels:
    app: openclaw-gateway
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw-gateway
  template:
    metadata:
      labels:
        app: openclaw-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: seed-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              if [ ! -f /data/openclaw.json ]; then
                echo '{"gateway":{"controlUi":{"allowedOrigins":["https://home.brettswift.com","https://openclaw.home.brettswift.com"]}}}' > /data/openclaw.json
              fi
          volumeMounts:
            - name: data
              mountPath: /data
        - name: fix-secrets-perms
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              [ -f /data/secrets.json ] && chmod 600 /data/secrets.json
              [ -f /data/openclaw.json ] && chmod 600 /data/openclaw.json
              [ -f /data/workspace/.config-secrets.json ] && chmod 600 /data/workspace/.config-secrets.json
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: gateway
          image: ghcr.io/brettswift/openclaw-gateway:live
          imagePullPolicy: Always
          workingDir: /home/node/.openclaw/workspace
          args:
            - node
            - /app/dist/index.js
            - gateway
            - --allow-unconfigured
            - --bind
            - "lan"
            - --port
            - "18789"
          ports:
            - containerPort: 18789
              name: http
            - containerPort: 18790
              name: bridge
          env:
            - name: HOME
              value: /home/node
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1536"
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-gateway-token
                  key: token
                  optional: true
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram-bot-token
                  key: token
                  optional: true
            - name: HA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-home-assistant-token
                  key: token
                  optional: true
            - name: MOONSHOT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-config-secrets
                  key: moonshot_api_key
                  optional: true
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-config-secrets
                  key: deepseek_api_key
                  optional: true
            - name: NOTION_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-config-secrets
                  key: notion_api_key
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /home/node/.openclaw
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /
              port: 18789
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 18789
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data
