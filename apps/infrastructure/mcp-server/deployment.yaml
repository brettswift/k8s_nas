apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: homeautomation
  labels:
    app: mcp-server
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      containers:
      - name: mcp-server
        image: homeassistant-ai/ha-mcp:latest
        imagePullPolicy: IfNotPresent
        command:
        - ha-mcp-web
        ports:
        - name: http
          containerPort: 8086
        env:
        - name: HOMEASSISTANT_URL
          value: http://homeassistant.homeautomation.svc.cluster.local:8123
        - name: HOMEASSISTANT_TOKEN
          valueFrom:
            secretKeyRef:
              name: mcp-homeassistant-token
              key: token
              optional: true
        - name: BACKUP_HINT
          value: normal
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 1Gi
        readinessProbe:
          tcpSocket:
            port: 8086
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 6
        livenessProbe:
          tcpSocket:
            port: 8086
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
