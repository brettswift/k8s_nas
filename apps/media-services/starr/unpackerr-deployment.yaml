apiVersion: apps/v1
kind: Deployment
metadata:
  name: unpackerr
  namespace: media
  labels:
    app: unpackerr
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: unpackerr
  template:
    metadata:
      labels:
        app: unpackerr
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
      containers:
      - name: unpackerr
        image: golift/unpackerr:latest
        env:
        - name: TZ
          valueFrom:
            configMapKeyRef:
              name: starr-common-config
              key: TZ
        - name: UN_SONARR_0_URL
          valueFrom:
            configMapKeyRef:
              name: starr-common-config
              key: SONARR_URL
        - name: UN_SONARR_0_API_KEY
          valueFrom:
            secretKeyRef:
              name: starr-secrets
              key: SONARR_API_KEY
        - name: UN_RADARR_0_URL
          valueFrom:
            configMapKeyRef:
              name: starr-common-config
              key: RADARR_URL
        - name: UN_RADARR_0_API_KEY
          valueFrom:
            secretKeyRef:
              name: starr-secrets
              key: RADARR_API_KEY
        - name: UN_DEBUG
          value: "true"
        volumeMounts:
        - name: downloads
          mountPath: /data/torrents
        - name: usenet
          mountPath: /usenet
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
      volumes:
      - name: downloads
        hostPath:
          path: /mnt/data/downloads
          type: Directory
      - name: usenet
        hostPath:
          path: /mnt/data/usenet
          type: Directory
