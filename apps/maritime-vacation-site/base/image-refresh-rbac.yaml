apiVersion: v1
kind: ServiceAccount
metadata:
  name: image-refresh
  namespace: maritime-vacation-site
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: image-refresh
  namespace: maritime-vacation-site
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: image-refresh
  namespace: maritime-vacation-site
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: image-refresh
subjects:
- kind: ServiceAccount
  name: image-refresh
  namespace: maritime-vacation-site
