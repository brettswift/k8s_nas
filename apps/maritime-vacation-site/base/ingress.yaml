apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: maritime-vacation-site
  namespace: maritime-vacation-site
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: vacation.home.brettswift.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: maritime-vacation-site
                port:
                  number: 80
