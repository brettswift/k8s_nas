apiVersion: batch/v1
kind: Job
metadata:
  name: image-refresh
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  activeDeadlineSeconds: 330
  backoffLimit: 0
  template:
    spec:
      serviceAccountName: image-refresh
      restartPolicy: Never
      containers:
        - name: image-refresh
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e

              REPO="${IMAGE#ghcr.io/}"
              echo "=== Image refresh: $REPO:$TAG ==="

              POD_IMAGE_ID=$(kubectl get pods -l app=travel-planner \
                -o jsonpath='{.items[0].status.containerStatuses[0].imageID}' 2>/dev/null || true)
              if [ -z "$POD_IMAGE_ID" ]; then
                echo "No running pod found. Nothing to compare. Exiting."
                exit 0
              fi
              POD_DIGEST="${POD_IMAGE_ID#*@}"
              echo "Pod digest: $POD_DIGEST"

              if [ ! -f /tmp/ghcr/.dockerconfigjson ]; then
                echo "ghcr-pull secret not mounted. Exiting."
                exit 0
              fi
              GHCR_USER=$(jq -r '.auths["ghcr.io"].username' /tmp/ghcr/.dockerconfigjson)
              GHCR_PASS=$(jq -r '.auths["ghcr.io"].password' /tmp/ghcr/.dockerconfigjson)
              if [ -z "$GHCR_USER" ] || [ "$GHCR_USER" = "null" ]; then
                echo "Could not parse credentials from ghcr-pull secret. Exiting."
                exit 0
              fi
              echo "GHCR auth: user=$GHCR_USER"

              TOKEN=$(curl -sf -u "$GHCR_USER:$GHCR_PASS" \
                "https://ghcr.io/token?service=ghcr.io&scope=repository:$REPO:pull" \
                | jq -r .token)
              if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
                echo "GHCR token request failed. Exiting."
                exit 0
              fi
              echo "GHCR token: OK"

              ACCEPT="application/vnd.oci.image.index.v1+json"
              ACCEPT="$ACCEPT, application/vnd.docker.distribution.manifest.list.v2+json"
              ACCEPT="$ACCEPT, application/vnd.docker.distribution.manifest.v2+json"
              ACCEPT="$ACCEPT, application/vnd.oci.image.manifest.v1+json"

              MAX_ATTEMPTS=20
              SLEEP_SEC=15

              for i in $(seq 1 $MAX_ATTEMPTS); do
                HEADERS=$(curl -sf \
                  -H "Accept: $ACCEPT" \
                  -H "Authorization: Bearer $TOKEN" \
                  "https://ghcr.io/v2/$REPO/manifests/$TAG" \
                  -D - -o /dev/null 2>&1 || true)
                REGISTRY_DIGEST=$(echo "$HEADERS" | grep -i docker-content-digest | sed 's/.*: //' | tr -d '\r')

                if [ -z "$REGISTRY_DIGEST" ]; then
                  echo "[attempt $i/$MAX_ATTEMPTS] Could not get digest from registry."
                  echo "Response headers: $HEADERS"
                  if [ "$i" -lt "$MAX_ATTEMPTS" ]; then
                    echo "Retrying in ${SLEEP_SEC}s..."
                    sleep $SLEEP_SEC
                  else
                    echo "Exiting."
                    exit 0
                  fi
                  continue
                fi

                if [ "$i" -eq 1 ]; then
                  echo "Registry digest: $REGISTRY_DIGEST"
                fi

                if [ "$POD_DIGEST" != "$REGISTRY_DIGEST" ]; then
                  echo "Digests differ! Restarting deployment/$DEPLOYMENT (attempt $i)"
                  echo "  pod=$POD_DIGEST"
                  echo "  reg=$REGISTRY_DIGEST"
                  kubectl rollout restart deployment/$DEPLOYMENT
                  kubectl rollout status deployment/$DEPLOYMENT --timeout=90s
                  echo "Rollout complete."
                  exit 0
                fi

                if [ "$i" -lt "$MAX_ATTEMPTS" ]; then
                  echo "[attempt $i/$MAX_ATTEMPTS] Digests match, waiting for new image... (sleep ${SLEEP_SEC}s)"
                  sleep $SLEEP_SEC
                else
                  echo "[attempt $i/$MAX_ATTEMPTS] No digest change within timeout. Exiting."
                  exit 0
                fi
              done
          env:
            - name: IMAGE
              value: ghcr.io/brettswift/travel-planner
            - name: TAG
              value: latest
            - name: DEPLOYMENT
              value: travel-planner
          volumeMounts:
            - name: ghcr-pull
              mountPath: /tmp/ghcr
              readOnly: true
      volumes:
        - name: ghcr-pull
          secret:
            secretName: ghcr-pull
            optional: true
            items:
              - key: .dockerconfigjson
                path: .dockerconfigjson
