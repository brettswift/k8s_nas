apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: f1-predictor-ingress-subdomain
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    external-dns.alpha.kubernetes.io/hostname: f1-dev.home.brettswift.com
    external-dns.alpha.kubernetes.io/target: "68.147.109.77"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - f1-dev.home.brettswift.com
    secretName: home-brettswift-com-tls
  rules:
  - host: f1-dev.home.brettswift.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: f1-predictor
            port:
              number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: f1-predictor-ingress-path
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - home.brettswift.com
    secretName: home-brettswift-com-tls
  rules:
  - host: home.brettswift.com
    http:
      paths:
      - path: /f1-predictor-dev(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: f1-predictor
            port:
              number: 80
