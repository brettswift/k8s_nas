apiVersion: batch/v1
kind: Job
metadata:
  name: image-refresh
  namespace: f1-predictor
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  activeDeadlineSeconds: 330
  backoffLimit: 0
  template:
    spec:
      serviceAccountName: image-refresh
      restartPolicy: Never
      containers:
      - name: image-refresh
        image: bitnami/kubectl:latest
        command:
        - /bin/sh
        - -c
        - |
          set -e
          REPO="${IMAGE#ghcr.io/}"
          CREDENTIALS=""
          if [ -f /tmp/ghcr/.dockerconfigjson ]; then
            GHCR_USER=$(sed -n 's/.*"username"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' /tmp/ghcr/.dockerconfigjson | head -1)
            GHCR_PASS=$(sed -n 's/.*"password"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' /tmp/ghcr/.dockerconfigjson | head -1)
            [ -n "$GHCR_USER" ] && [ -n "$GHCR_PASS" ] && CREDENTIALS="$GHCR_USER:$GHCR_PASS"
            echo "[verbose] ghcr-pull mount: found, user=$GHCR_USER" >&2
          else
            echo "[verbose] ghcr-pull mount: not found at /tmp/ghcr/.dockerconfigjson" >&2
          fi
          get_registry_digest() {
            if [ -n "$CREDENTIALS" ]; then
              TOKEN_RESP=$(curl -sSf -u "$CREDENTIALS" "https://ghcr.io/token?service=ghcr.io&scope=repository:$REPO:pull" 2>/tmp/curl.err || true)
              TOKEN=$(echo "$TOKEN_RESP" | sed -n 's/.*"token"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
              [ -z "$TOKEN" ] && TOKEN=$(echo "$TOKEN_RESP" | sed -n 's/.*"access_token"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
              if [ -z "$TOKEN" ]; then
                echo "[verbose] token endpoint: no token (curl_err=$(cat /tmp/curl.err 2>/dev/null | head -1), resp_len=${#TOKEN_RESP})" >&2
                return
              fi
              echo "[verbose] token endpoint: OK (token length=${#TOKEN})" >&2
              MANIFEST_OUT=$(curl -sSf -H "Accept: application/vnd.docker.distribution.manifest.v2+json" -H "Authorization: Bearer $TOKEN" "https://ghcr.io/v2/$REPO/manifests/$TAG" -D - -o /dev/null 2>/tmp/curl.err || true)
              [ -z "$MANIFEST_OUT" ] && [ -s /tmp/curl.err ] && echo "[verbose] manifest curl err: $(cat /tmp/curl.err)" >&2
              echo "$MANIFEST_OUT"
            else
              curl -sf -H "Accept: application/vnd.docker.distribution.manifest.v2+json" "https://ghcr.io/v2/$REPO/manifests/$TAG" -D - -o /dev/null 2>/dev/null
            fi
          }
          echo "Image refresh: checking $REPO:$TAG vs deployment $DEPLOYMENT"
          for i in $(seq 1 20); do
            CURRENT=$(kubectl get pods -l app=f1-predictor -o jsonpath='{.items[0].status.containerStatuses[0].imageID}' 2>/dev/null || true)
            if [ -z "$CURRENT" ]; then
              PHASE=$(kubectl get pods -l app=f1-predictor -o jsonpath='{.items[0].status.phase}' 2>/dev/null || true)
              REASON=$(kubectl get pods -l app=f1-predictor -o jsonpath='{.items[0].status.containerStatuses[0].state.waiting.reason}' 2>/dev/null || true)
              if [ -n "$PHASE" ]; then
                echo "No running pod yet (phase=$PHASE, reason=$REASON), waiting..."
              else
                echo "No running pod yet (no pods with label app=f1-predictor), waiting..."
              fi
              sleep 15
              continue
            fi
            CURRENT_DIGEST="${CURRENT#*@}"
            echo "Pod image digest: $CURRENT_DIGEST (sanity check: can read pod)"
            REGISTRY_RESP=$(get_registry_digest)
            REGISTRY_DIGEST=$(echo "$REGISTRY_RESP" | grep -i docker-content-digest | sed 's/.*: //' | tr -d '\r')
            if [ -z "$REGISTRY_DIGEST" ]; then
              echo "Could not get image from registry for $TAG (current pod: $CURRENT_DIGEST) - possible GHCR auth issue (attempt $i/20)"
              sleep 15
              continue
            fi
            echo "Registry digest for $TAG: $REGISTRY_DIGEST"
            if [ "$CURRENT_DIGEST" = "$REGISTRY_DIGEST" ]; then
              echo "Digests match: no rollout needed"
            else
              echo "Digests differ. Pod=$CURRENT_DIGEST Registry=$REGISTRY_DIGEST. Triggering rollout restart"
              kubectl rollout restart deployment/$DEPLOYMENT
              kubectl rollout status deployment/$DEPLOYMENT --timeout=300s
              echo "Rollout complete"
              exit 0
            fi
            echo "Waiting (attempt $i/20)"
            sleep 15
          done
          echo "No digest change detected within timeout; exiting 0"
          exit 0
        env:
        - name: IMAGE
          value: "ghcr.io/brettswift/f1-predictor"
        - name: TAG
          value: "live"
        - name: DEPLOYMENT
          value: "f1-predictor"
        volumeMounts:
        - name: ghcr-pull
          mountPath: /tmp/ghcr
          readOnly: true
      volumes:
      - name: ghcr-pull
        secret:
          secretName: ghcr-pull
          optional: true
          items:
          - key: .dockerconfigjson
            path: .dockerconfigjson
