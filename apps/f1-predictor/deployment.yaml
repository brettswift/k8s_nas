apiVersion: apps/v1
kind: Deployment
metadata:
  name: f1-predictor
  namespace: f1-predictor
  labels:
    app: f1-predictor
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: f1-predictor
  template:
    metadata:
      labels:
        app: f1-predictor
    spec:
      containers:
      - name: f1-predictor
        image: ghcr.io/brettswift/f1-predictor:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
          name: http
        env:
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: f1-predictor-secret
              key: secret-key
              optional: true
        - name: DATABASE_PATH
          value: "/data/f1_predictions.db"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        volumeMounts:
        - name: data
          mountPath: /data
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: f1-predictor-data
